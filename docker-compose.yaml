services:
  postgres:
    image: postgres
    restart: always
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h localhost -U $$POSTGRES_USER" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    image: ghcr.io/taldoflemis/dc-warehouse-poc-api:latest
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: warehouse
      PORT: 3000
      SESSION_SECRET: change-me-in-production
      CORS_ORIGIN: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: ghcr.io/taldoflemis/dc-warehouse-poc-web:latest
    ports:
      - '8080:8080'
    environment:
      VITE_API_URL: http://localhost:3000/api
    depends_on:
      - api